# QoS overrides for `ros2 bag play --qos-profile-overrides-path`.
#
# The bag recorded /ouster/points with BEST_EFFORT reliability. RViz's PointCloud2
# "Live Scan" display (config/localization.rviz) subscribes with RELIABLE QoS, so it
# would never connect to a best-effort publisher. Republishing /ouster/points as
# RELIABLE satisfies both: a reliable publisher is compatible with the localizer's
# best-effort subscriber AND RViz's reliable subscriber. Used by run_viz_tree.sh.
#
# Volatile durability + shallow KeepLast keeps playback from blocking if a
# subscriber falls behind (old samples are dropped rather than buffered).
/ouster/points:
  reliability: reliable
  durability: volatile
  history: keep_last
  depth: 10
