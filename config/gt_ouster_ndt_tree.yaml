# Single-robot localization against the GLIM ground-truth map (gt_map.ply),
# producing a PROPER REP-105 TF tree:  map -> odom -> base_link -> {os_lidar, imu}
#
#   map  -> odom        : published by THIS localizer (enable_map_odom_tf: true)
#   odom -> base_link   : identity static_transform_publisher (replay/eval; the
#                         NDT map-match carries the motion). Swap for KISS-ICP /
#                         a LIO when you need a true smooth odometry layer.
#   base_link -> os_lidar, base_link -> imu : static_transform_publisher in the
#                         run script, using the extrinsics the bag's /tf_static
#                         actually carries (it is NOT camera-only):
#                             base_link -> os_lidar = (0.1105, 0, 0.404) yaw 180
#                             base_link -> imu       = (0.062, 0, 0.015) yaw 90
#
# IMU is integrated here via preintegration WITH the base-frame transform. The
# earlier "IMU made tracking worse" result was because tf_static was never
# published, so the localizer had no lidar<-imu extrinsic to rotate the IMU into
# the base frame. With base_link->imu now published, preintegration is valid.
/**:
    ros__parameters:
      # --- registration ---
      registration_method: "NDT_OMP"
      ndt_resolution: 2.0          # wider NDT basin -> recovers from rough seed at turns
      ndt_step_size: 0.1
      ndt_num_threads: 4
      ndt_max_iterations: 50       # more iterations to pull back from a bad seed
      transform_epsilon: 0.01
      score_threshold: 5.0         # tolerate a momentarily worse scan (avoid recovery spiral)
      reject_above_score_threshold: true

      # --- crop NDT target to a neighbourhood of the current pose ---
      # prevents false matches to far-away similar structure in the big map
      enable_local_map_crop: true
      local_map_radius: 80.0
      local_map_min_points: 100

      # --- scan preprocessing (Ouster) ---
      voxel_leaf_size: 0.2         # downsample input scan (m)
      scan_max_range: 100.0
      scan_min_range: 1.0          # drop near-field self returns
      scan_period: 0.1

      # --- map ---
      use_pcd_map: true
      map_path: "/ws/gt_map/gt_map.ply"

      # --- initial pose ---
      # The GLIM map is built in the os_lidar frame (map origin == first os_lidar
      # pose). We localize base_link, so the t0 seed for map->base_link is the
      # inverse of base_link->os_lidar: translate (0.1105, 0, -0.404), yaw 180.
      set_initial_pose: true
      initial_pose_x: 0.1105
      initial_pose_y: 0.0
      initial_pose_z: -0.404
      initial_pose_qx: 0.0
      initial_pose_qy: 0.0
      initial_pose_qz: 1.0         # yaw 180 deg (q = 0,0,1,0)
      initial_pose_qw: 0.0

      # --- prediction (IMU integrated) ---
      use_odom: false
      use_imu: false                       # IMU-aided scan undistortion/orientation (optional; off to isolate)
      use_imu_preintegration: true         # integrate /imu/data between scans for the pose prediction
      imu_preintegration_use_base_frame_transform: true  # rotate IMU into base_link via base_link->imu TF
      predict_pose_from_previous_delta: true             # constant-velocity fallback when preintegration is cold

      # --- TF output: Mode B (map -> odom) ---
      enable_map_odom_tf: true     # publish map -> odom; needs external odom -> base_link
      global_frame_id: map
      odom_frame_id: odom
      base_frame_id: base_link

      enable_debug: true
      enable_timer_publishing: false
      pose_publish_frequency: 30.0
